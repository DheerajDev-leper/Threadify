<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Expired — StyleAdmin</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/admin.css' %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
</head>
<body class="auth-center-body">
  <div class="auth-standalone-card auth-standalone-card--sm">

    <div class="auth-card-brand">
      <div class="auth-card-brand-icon">✦</div>
      <span class="auth-card-brand-name">StyleAdmin</span>
    </div>

    <div class="auth-card-icon auth-card-icon--red">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <h1 class="auth-card-title">Link expired</h1>
    <p class="auth-card-subtitle">
      This password reset link is invalid or has expired.<br/>
      Reset links are valid for <strong>1 hour</strong> and can only be used once.
    </p>

    <a href="{% url 'admin_forgot_password' %}" class="auth-standalone-btn">Request a new link</a>

    <a href="{% url 'admin_login' %}" class="auth-standalone-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to sign in
    </a>

    <p class="auth-standalone-footer">✦ StyleAdmin &nbsp;·&nbsp; v2.0</p>

  </div>
</body>
</html>
