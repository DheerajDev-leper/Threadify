{% extends 'base.html' %}
{% block content %}



<section class="auth-section">
  <div class="auth-card">
    <div class="auth-card-top">
      <div class="auth-eyebrow">Account Recovery</div>
      <h1 class="auth-title">Forgot Password?</h1>
      <p class="auth-sub">Enter the email address associated with your account and we'll send you a reset link.</p>
      <div class="auth-gold-line"></div>
    </div>

    {% include 'includes/alerts.html' %}

    <div class="auth-body">
      <form action="{% url 'forgetPassword' %}" method="POST" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-control" placeholder="your@email.com" name="email">
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Send Reset Link</button>
      </form>
    </div>

    <div class="auth-footer">
      Remembered it? <a href="{% url 'login' %}">Sign in</a>
      &nbsp;·&nbsp;
      New here? <a href="{% url 'register' %}">Create account</a>
    </div>
  </div>
</section>

{% endblock %}
