{% extends 'base.html' %}
{% block content %}

<style>
.auth-section{min-height:90vh;display:flex;align-items:center;justify-content:center;background:var(--charcoal);position:relative;overflow:hidden;padding:4rem 1rem;}
.auth-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(201,168,76,0.07),transparent 60%);}
.auth-section::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.3;}
.auth-card{background:var(--cream);width:100%;max-width:460px;position:relative;z-index:1;animation:authReveal 0.7s var(--ease-luxury) both;}
@keyframes authReveal{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.auth-card-top{padding:3rem 3rem 0;}
.auth-eyebrow{font-size:0.58rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.auth-title{font-family:var(--font-display);font-size:2.4rem;font-weight:300;color:var(--text-dark);margin-bottom:0.4rem;letter-spacing:0.04em;}
.auth-sub{font-size:0.72rem;letter-spacing:0.1em;color:var(--text-faint);line-height:1.8;margin-bottom:2.5rem;}
.auth-gold-line{height:1px;background:linear-gradient(90deg,var(--gold),transparent);opacity:0.4;margin-bottom:2.5rem;}
.auth-body{padding:0 3rem 3rem;}
.auth-form .form-group{margin-bottom:1.8rem;}
.auth-form label{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-light);}
.auth-form .form-control{border:none;border-bottom:1px solid var(--border-mid);border-radius:0;padding:0.8rem 0;font-size:0.88rem;color:var(--text-dark);background:transparent;font-family:var(--font-body);letter-spacing:0.04em;}
.auth-form .form-control:focus{border-bottom-color:var(--gold);outline:none;box-shadow:none;}
.auth-form .form-control::placeholder{color:var(--text-faint);font-weight:300;}
.auth-submit{width:100%;padding:1rem;font-size:0.68rem;letter-spacing:0.25em;text-transform:uppercase;}
.auth-footer{border-top:1px solid var(--border-light);padding:1.5rem 3rem;text-align:center;font-size:0.68rem;letter-spacing:0.12em;color:var(--text-faint);}
.auth-footer a{color:var(--gold);border-bottom:1px solid rgba(201,168,76,0.3);padding-bottom:1px;}
</style>

<section class="auth-section">
  <div class="auth-card">
    <div class="auth-card-top">
      <div class="auth-eyebrow">Account Recovery</div>
      <h1 class="auth-title">Forgot Password?</h1>
      <p class="auth-sub">Enter the email address associated with your account and we'll send you a reset link.</p>
      <div class="auth-gold-line"></div>
    </div>

    {% include 'includes/alerts.html' %}

    <div class="auth-body">
      <form action="{% url 'forgetPassword' %}" method="POST" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-control" placeholder="your@email.com" name="email">
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Send Reset Link</button>
      </form>
    </div>

    <div class="auth-footer">
      Remembered it? <a href="{% url 'login' %}">Sign in</a>
      &nbsp;·&nbsp;
      New here? <a href="{% url 'register' %}">Create account</a>
    </div>
  </div>
</section>

{% endblock %}
