{% extends 'base.html' %}
{% block content %}

<style>
.dashboard-section{padding:5rem 0;background:var(--off-white);}
.dash-page-header{background:var(--charcoal);padding:3.5rem 0;position:relative;overflow:hidden;}
.dash-page-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(201,168,76,0.06),transparent 55%);}
.dash-page-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.3;}
.dash-eyebrow{font-size:0.58rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:0.8rem;}
.dash-title{font-family:var(--font-display);font-size:2.8rem;font-weight:300;color:var(--cream);letter-spacing:0.04em;}
.pw-card{background:var(--cream);border:1px solid var(--border-light);}
.pw-card-header{padding:1.5rem 2.5rem;border-bottom:1px solid var(--border-light);}
.pw-card-title{font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-light);}
.pw-card-body{padding:2.5rem;max-width:460px;}
.pw-card-body .form-group{margin-bottom:2rem;}
.pw-card-body label{font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-light);}
.pw-card-body .form-control{border:none;border-bottom:1px solid var(--border-mid);border-radius:0;padding:0.8rem 0;font-size:0.88rem;color:var(--text-dark);background:transparent;font-family:var(--font-body);letter-spacing:0.04em;}
.pw-card-body .form-control:focus{border-bottom-color:var(--gold);outline:none;box-shadow:none;}
.pw-card-body .form-control::placeholder{color:var(--text-faint);font-weight:300;}
.pw-hint{font-size:0.65rem;letter-spacing:0.06em;color:var(--text-faint);margin-top:0.5rem;line-height:1.6;}
.pw-submit{padding:1rem 3rem;font-size:0.68rem;letter-spacing:0.25em;}
.pw-strength{height:2px;background:var(--border-light);margin-top:0.5rem;overflow:hidden;}
.pw-strength-bar{height:100%;width:0;background:var(--gold);transition:width 0.3s,background 0.3s;}

/* ── CHANGE PASSWORD RESPONSIVE ─────────────────────────────── */
@media (max-width: 768px) {
  .dash-page-header { padding: 2.5rem 0; }
  .dash-title { font-size: 2.2rem; }
  .dashboard-section { padding: 2.5rem 0; }
  .pw-card-header { padding: 1.2rem 1.5rem; }
  .pw-card-body { padding: 1.8rem 1.5rem; max-width: 100%; }
}

@media (max-width: 576px) {
  .dash-title { font-size: 1.9rem; }
  .pw-card-body { padding: 1.4rem 1rem; }
  .pw-submit { width: 100%; padding: 1rem; }
}
</style>

<div class="dash-page-header">
  <div class="container">
    <div class="dash-eyebrow">Account Security</div>
    <div class="dash-title">Change Password</div>
  </div>
</div>

<section class="dashboard-section">
  <div class="container">
    {% include 'includes/alerts.html' %}
    <div class="row">
      {% include 'includes/dashboard_sidebar.html' %}

      <main class="col-md-9">
        <div class="pw-card stagger-item">
          <div class="pw-card-header">
            <div class="pw-card-title"><i class="fa fa-lock mr-2" style="color:var(--gold);"></i>Update Your Password</div>
          </div>
          <div class="pw-card-body">
            <form action="{% url 'change_password' %}" method="POST">
              {% csrf_token %}
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password" class="form-control" placeholder="••••••••" required>
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" class="form-control" placeholder="••••••••" required id="newPwInput">
                <div class="pw-strength"><div class="pw-strength-bar" id="pwStrengthBar"></div></div>
                <div class="pw-hint">Use at least 8 characters with a mix of letters and numbers.</div>
              </div>
              <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
              </div>
              <div style="border-top:1px solid var(--border-light);padding-top:2rem;">
                <button type="submit" class="btn btn-primary pw-submit">Update Password</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>
</section>

<script>
document.getElementById('newPwInput').addEventListener('input', function() {
  var v = this.value, bar = document.getElementById('pwStrengthBar');
  var strength = 0;
  if (v.length >= 8) strength += 33;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) strength += 33;
  if (/[0-9]/.test(v) || /[^a-zA-Z0-9]/.test(v)) strength += 34;
  bar.style.width = strength + '%';
  bar.style.background = strength < 40 ? '#8b2e2e' : strength < 75 ? 'var(--gold)' : '#4a7a40';
});
</script>

{% endblock %}
