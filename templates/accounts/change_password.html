{% extends 'base.html' %}
{% load static %}
{% block content %}



<div class="dash-page-header">
  <div class="container">
    <div class="dash-eyebrow">Account Security</div>
    <div class="dash-title">Change Password</div>
  </div>
</div>

<section class="dashboard-section">
  <div class="container">
    {% include 'includes/alerts.html' %}
    <div class="row">
      {% include 'includes/dashboard_sidebar.html' %}

      <main class="col-md-9">
        <div class="pw-card stagger-item">
          <div class="pw-card-header">
            <div class="pw-card-title"><i class="fa fa-lock mr-2" style="color:var(--gold);"></i>Update Your Password</div>
          </div>
          <div class="pw-card-body">
            <form action="{% url 'change_password' %}" method="POST">
              {% csrf_token %}
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password" class="form-control" placeholder="••••••••" required>
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" class="form-control" placeholder="••••••••" required id="newPwInput">
                <div class="pw-strength"><div class="pw-strength-bar" id="pwStrengthBar"></div></div>
                <div class="pw-hint">Use at least 8 characters with a mix of letters and numbers.</div>
              </div>
              <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
              </div>
              <div style="border-top:1px solid var(--border-light);padding-top:2rem;">
                <button type="submit" class="btn btn-primary pw-submit">Update Password</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>
</section>

<script src="{% static 'js/account.js' %}" type="text/javascript"></script>

{% endblock %}
