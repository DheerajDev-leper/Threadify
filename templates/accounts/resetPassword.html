{% extends 'base.html' %}
{% block content %}



<section class="auth-section">
  <div class="auth-card">
    <div class="auth-card-top">
      <div class="auth-eyebrow">Account Security</div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Choose a strong new password for your account</p>
      <div class="auth-gold-line"></div>
    </div>

    {% include 'includes/alerts.html' %}

    <div class="auth-body">
      <form action="{% url 'resetPassword' %}" method="POST" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
          <label>New Password</label>
          <input type="password" class="form-control" placeholder="••••••••" name="password">
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" class="form-control" placeholder="••••••••" name="confirm_password">
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Set New Password</button>
      </form>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>
</section>

{% endblock %}
